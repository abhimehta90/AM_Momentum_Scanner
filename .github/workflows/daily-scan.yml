name: Daily AM_Watch Scan

on:
  schedule:
    - cron: '30 10 * * 1-5'   # 10:30 UTC = 4:00 PM IST, Mon-Fri
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          SCANNER_OUT_DIR: ./site
        run: |
          mkdir -p site
          python scanner.py
          ls -la site/

      - name: Commit snapshot
        run: |
          git config user.name  "scanner-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .scanner_snapshots/ || true
          if git diff --staged --quiet; then
            echo "No new snapshot to commit."
          else
            git commit -m "snapshot: $(date -u +%Y-%m-%d)"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - id: deploy
        uses: actions/deploy-pages@v4
